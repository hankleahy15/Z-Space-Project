<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Spiral Gallery</title>
<style>
  body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    perspective: 1500px; /* Adds depth */
    background-image: url(Images/galaxy\ image.jpg);
    background-size: cover;
  }

  .spiral-container {
    position: relative;
    width: 400px;
    height: 400px;
    transform-style: preserve-3d;
    animation: rotate 20s linear infinite;
  }

  .spiral-container a {
    position: absolute;
    width: 120px;
    height: 80px;
    transform-style: preserve-3d;
    transition: transform 0.5s, opacity 0.5s;
    border: 2px solid #fff;
    border-radius: 10px;
    overflow: hidden;
    text-decoration: none;
  }

  .spiral-container a img {
    width: 100%;
    height: 100%;
    display: block;
  }

  .spiral-container{
    display: flex;
    align-items: center;
  }

  @keyframes rotate {
    from { transform: rotateY(0deg); }
    to { transform: rotateY(360deg); }
  }

  .title{
    position: absolute;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    color: white;
    font-family: 'Arial', sans-serif;
    text-shadow: 2px 2px 4px rgba(0,0,0,1.0);
    font-size: 50pt;
    text-align: center;
  }
</style>
</head>
<body>
    <div class="title">
        <h1>HANK LEAHY'S PHOTO GALAXY</h1>
    </div>
    

<div class="spiral-container" id="spiral">

</html>
